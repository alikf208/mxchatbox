<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX CHAT</title>

<style>
:root{
    --pink:#ff4fd8;
    --blue:#4f8cff;
    --green:#00d084;
    --glass:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.15);
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    color:var(--text);
    background:linear-gradient(
        -45deg,
        var(--pink),
        var(--blue),
        var(--green),
        var(--pink)
    );
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(50px);
    z-index:-1;
}

/* NAVBAR */

.navbar{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    background:rgba(0,0,0,.15);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
    font-size:28px;
    font-weight:800;
    background:linear-gradient(
        90deg,
        var(--pink),
        var(--blue),
        var(--green)
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.nav-actions{
    display:flex;
    gap:10px;
}

.btn{
    border:none;
    cursor:pointer;
    color:white;
    font-weight:600;
    padding:10px 18px;
    border-radius:14px;
    background:linear-gradient(
        90deg,
        var(--pink),
        var(--blue),
        var(--green)
    );
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

/* MAIN */

.main{
    height:calc(100vh - 70px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.chat-wrapper{
    width:min(1100px,100%);
    height:90%;
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:28px;
    backdrop-filter:blur(20px);
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    display:flex;
    flex-direction:column;
}

/* CHAT AREA */

.chat-area{
    flex:1;
    overflow-y:auto;
    padding:25px;
    scroll-behavior:smooth;
}

.message{
    display:flex;
    margin-bottom:18px;
    animation:fadeIn .3s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.message.user{
    justify-content:flex-end;
}

.message.ai{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:14px 18px;
    border-radius:22px;
    line-height:1.5;
    position:relative;
    word-wrap:break-word;
}

.user .bubble{
    background:linear-gradient(
        135deg,
        var(--blue),
        var(--pink)
    );
}

.ai .bubble{
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.12);
}

.avatar{
    width:40px;
    height:40px;
    min-width:40px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
    background:linear-gradient(
        135deg,
        var(--green),
        var(--blue)
    );
}

.time{
    display:block;
    margin-top:8px;
    font-size:11px;
    opacity:.65;
}

.copy-btn{
    margin-top:8px;
    font-size:12px;
    background:none;
    border:none;
    color:#fff;
    cursor:pointer;
    opacity:.8;
}

/* INPUT */

.input-area{
    padding:18px;
    background:rgba(0,0,0,.15);
    border-top:1px solid rgba(255,255,255,.1);
}

.input-container{
    display:flex;
    gap:10px;
}

#messageInput{
    flex:1;
    border:none;
    outline:none;
    padding:16px;
    border-radius:18px;
    background:rgba(255,255,255,.1);
    color:white;
    font-size:15px;
}

#messageInput::placeholder{
    color:rgba(255,255,255,.7);
}

.send-btn{
    min-width:120px;
}

/* TYPING */

.typing{
    display:flex;
    gap:5px;
    padding:10px;
}

.typing span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:white;
    animation:bounce 1s infinite;
}

.typing span:nth-child(2){
    animation-delay:.2s;
}

.typing span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-5px);
    }
}

@media(max-width:768px){

    .bubble{
        max-width:90%;
    }

    .btn{
        padding:8px 14px;
        font-size:13px;
    }

    .logo{
        font-size:22px;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">MX CHAT</div>

    <div class="nav-actions">
        <button class="btn" onclick="newChat()">New Chat</button>
        <button class="btn" onclick="clearChat()">Clear Chat</button>
    </div>
</nav>

<div class="main">

    <div class="chat-wrapper">

        <div class="chat-area" id="chatArea">

            <div class="message ai">
                <div class="avatar">🤖</div>

                <div class="bubble">
                    Hello! I am MX CHAT. Ask me anything.
                    <span class="time" id="welcomeTime"></span>
                </div>
            </div>

        </div>

        <div class="input-area">
            <div class="input-container">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type your message..."
                >

                <button
                    class="btn send-btn"
                    onclick="sendMessage()">
                    Send
                </button>
            </div>
        </div>

    </div>

</div>

<script>

const chatArea = document.getElementById("chatArea");
const input = document.getElementById("messageInput");

document.getElementById("welcomeTime").textContent =
new Date().toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit'
});

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

function getTime(){
    return new Date().toLocaleTimeString([],{
        hour:'2-digit',
        minute:'2-digit'
    });
}

function addUserMessage(text){

    const msg = document.createElement("div");
    msg.className = "message user";

    msg.innerHTML = `
        <div class="bubble">
            ${escapeHTML(text)}
            <span class="time">${getTime()}</span>
        </div>
    `;

    chatArea.appendChild(msg);
    scrollBottom();
}

function addAIMessage(text){

    const msg = document.createElement("div");
    msg.className = "message ai";

    msg.innerHTML = `
        <div class="avatar">🤖</div>

        <div class="bubble">
            ${text}
            <br>
            <button class="copy-btn"
            onclick="copyText(this)">
            Copy
            </button>

            <span class="time">${getTime()}</span>
        </div>
    `;

    chatArea.appendChild(msg);
    scrollBottom();
}

function showTyping(){

    const typing = document.createElement("div");

    typing.className = "message ai";
    typing.id = "typing";

    typing.innerHTML = `
        <div class="avatar">🤖</div>

        <div class="bubble">
            <div class="typing">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    `;

    chatArea.appendChild(typing);
    scrollBottom();
}

function removeTyping(){
    const t = document.getElementById("typing");
    if(t) t.remove();
}

function sendMessage(){

    const text = input.value.trim();

    if(!text) return;

    addUserMessage(text);

    input.value = "";

    showTyping();

    setTimeout(()=>{

        removeTyping();

        const reply = generateAIResponse(text);

        addAIMessage(reply);

    },1200);
}

function generateAIResponse(message){

    /*
    =====================================
    CONNECT YOUR AI API HERE
    =====================================

    Example:

    fetch("YOUR_API_ENDPOINT", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message
      })
    })

    =====================================
    */

    const responses = [

        "I'm MX CHAT. You can connect a real AI API here to generate intelligent responses.",

        "That's an interesting question. This demo currently uses placeholder responses.",

        "I can help with coding, learning, explanations, creative ideas, and much more when connected to an AI model.",

        "Thanks for your message. Integrate your preferred AI API inside generateAIResponse().",

        "MX CHAT is ready for AI integration. Replace this demo logic with your backend."
    ];

    return responses[
        Math.floor(Math.random()*responses.length)
    ];
}

function copyText(button){

    const bubble =
    button.parentElement.innerText
    .replace("Copy","");

    navigator.clipboard.writeText(bubble);

    button.innerText = "Copied!";

    setTimeout(()=>{
        button.innerText = "Copy";
    },1500);
}

function clearChat(){

    chatArea.innerHTML = `
    <div class="message ai">
        <div class="avatar">🤖</div>
        <div class="bubble">
            Hello! I am MX CHAT. Ask me anything.
            <span class="time">${getTime()}</span>
        </div>
    </div>
    `;
}

function newChat(){
    clearChat();
}

function scrollBottom(){
    chatArea.scrollTop =
    chatArea.scrollHeight;
}

function escapeHTML(text){

    const div =
    document.createElement("div");

    div.textContent = text;

    return div.innerHTML;
}

</script>

</body>
</html>
